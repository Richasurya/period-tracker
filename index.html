<!DOCTYPE html>
<html>
<head>
<title>Smart Women's Health Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- 🔐 LOGIN PAGE -->
<div id="loginPage" class="login-container">
<div class="login-box">
<h1>🌸 Welcome</h1>
<h2>Health Tracker</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>
</div>

<!-- 🌸 MAIN APP -->
<div class="app" id="mainApp">

<div class="top-bar">
<button onclick="toggleDarkMode()">🌗 Dark Mode</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<h1>🌸 Smart Women's Health Tracker</h1>

<div class="card">

<label>Last Period Date</label>
<input type="date" id="date">

<label>Cycle Length</label>
<input type="number" id="cycle" placeholder="28">

<label>Email</label>
<input type="email" id="email" placeholder="Reminder email">

<label>Mood</label>
<select id="mood">
<option>Happy</option>
<option>Sad</option>
<option>Irritated</option>
<option>Tired</option>
</select>

<label>Symptoms</label>
<select id="symptom">
<option>Cramps</option>
<option>Headache</option>
<option>Bloating</option>
<option>No Symptoms</option>
</select>

<button onclick="addEntry()">➕ Add Entry</button>
<button onclick="predict()">🔮 Predict Cycle</button>

</div>

<div class="results">
<h2 id="period"></h2>
<h3 id="ovulation"></h3>
<h3 id="fertile"></h3>
<h3 id="status"></h3>
</div>

<div class="card">
<h2>📊 Cycle Graph</h2>
<canvas id="cycleChart"></canvas>
</div>

<div class="card">
<h2>📊 Mood Analytics</h2>
<canvas id="moodChart"></canvas>
</div>

<div class="history-card">
<h2>📊 History</h2>
<ul id="history"></ul>
</div>

<div class="card">
<h2>🩺 Doctor Consultation</h2>
<textarea id="question" placeholder="Describe your issue..."></textarea>
<button onclick="askDoctor()">Ask Doctor</button>
<p id="doctorReply"></p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
